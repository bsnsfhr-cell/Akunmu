<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alinea - Produk Pilihan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            scroll-behavior: smooth;
        }

        .product-card:hover .product-overlay {
            opacity: 1;
        }

        .step-active {
            color: #111827;
            border-bottom: 2px solid #111827;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center">
                    <h1 class="text-2xl font-bold tracking-tighter text-black cursor-pointer" onclick="showPage('home')">ALINEA.</h1>
                </div>
                
                <div class="hidden md:flex space-x-8">
                    <a href="#" class="text-sm font-medium hover:text-gray-500 transition" onclick="showPage('home')">Katalog</a>
                    <a href="#" class="text-sm font-medium hover:text-gray-500 transition">Tentang Kami</a>
                    <a href="#" class="text-sm font-medium hover:text-gray-500 transition">Kontak</a>
                </div>

                <div class="flex items-center space-x-4">
                    <button class="relative p-2" onclick="showPage('cart')">
                        <i class="fa-solid fa-bag-shopping text-xl"></i>
                        <span id="cart-count" class="absolute top-0 right-0 bg-black text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center">0</span>
                    </button>
                    <button class="md:hidden p-2">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- App Container -->
    <main id="app-content" class="min-h-[calc(100vh-64px)]">
        <!-- Content will be injected here -->
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-100 py-12 mt-20">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-sm text-gray-500">© 2024 Alinea Collective. Semua hak dilindungi.</p>
        </div>
    </footer>

    <script>
        // --- State Management ---
        let cart = [];
        const products = [
            { id: 1, name: "Minimalist Linen Shirt", price: 450000, category: "Apparel", image: "https://images.unsplash.com/photo-1596755094514-f87e34085b2c?auto=format&fit=crop&q=80&w=800" },
            { id: 2, name: "Terra Cotta Vase", price: 220000, category: "Home", image: "https://images.unsplash.com/photo-1578500494198-246f612d3b3d?auto=format&fit=crop&q=80&w=800" },
            { id: 3, name: "Organic Cotton Tote", price: 125000, category: "Accessories", image: "https://images.unsplash.com/photo-1544816153-12ad5d710617?auto=format&fit=crop&q=80&w=800" },
            { id: 4, name: "Ceramic Coffee Mug", price: 185000, category: "Home", image: "https://images.unsplash.com/photo-1514228742587-6b1558fbed20?auto=format&fit=crop&q=80&w=800" },
            { id: 5, name: "Leather Card Holder", price: 350000, category: "Accessories", image: "https://images.unsplash.com/photo-1627123424574-724758594e93?auto=format&fit=crop&q=80&w=800" },
            { id: 6, name: "Abstract Art Print", price: 550000, category: "Art", image: "https://images.unsplash.com/photo-1513519245088-0e12902e35ca?auto=format&fit=crop&q=80&w=800" }
        ];

        // --- Core Functions ---
        function formatIDR(amount) {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0
            }).format(amount);
        }

        function updateCartCount() {
            const count = cart.reduce((acc, item) => acc + item.quantity, 0);
            document.getElementById('cart-count').innerText = count;
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            updateCartCount();
            showNotification(`${product.name} berhasil ditambahkan!`);
        }

        function showNotification(msg) {
            const toast = document.createElement('div');
            toast.className = "fixed bottom-5 right-5 bg-black text-white px-6 py-3 rounded-lg shadow-xl z-[100] transition-opacity duration-300";
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        // --- Router / Views ---
        function showPage(page) {
            const container = document.getElementById('app-content');
            window.scrollTo(0, 0);

            switch(page) {
                case 'home':
                    renderHome(container);
                    break;
                case 'cart':
                    renderCart(container);
                    break;
                case 'checkout':
                    renderCheckout(container);
                    break;
                case 'success':
                    renderSuccess(container);
                    break;
            }
        }

        function renderHome(container) {
            container.innerHTML = `
                <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
                    <div class="mb-12">
                        <h2 class="text-3xl font-bold mb-2">Semua Produk</h2>
                        <p class="text-gray-500">Koleksi terkurasi untuk gaya hidup minimalis Anda.</p>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                        ${products.map(product => `
                            <div class="group">
                                <div class="relative aspect-[4/5] bg-gray-200 overflow-hidden rounded-sm">
                                    <img src="${product.image}" alt="${product.name}" class="w-full h-full object-cover group-hover:scale-105 transition duration-700">
                                    <div class="absolute inset-0 bg-black/5 opacity-0 group-hover:opacity-100 transition duration-300 flex items-end p-4">
                                        <button onclick="addToCart(${product.id})" class="w-full bg-white text-black py-3 text-sm font-bold uppercase tracking-widest hover:bg-black hover:text-white transition">
                                            Tambah ke Keranjang
                                        </button>
                                    </div>
                                </div>
                                <div class="mt-4 flex justify-between items-start">
                                    <div>
                                        <h3 class="text-sm font-medium text-gray-900">${product.name}</h3>
                                        <p class="text-sm text-gray-500 mt-1">${product.category}</p>
                                    </div>
                                    <p class="text-sm font-semibold">${formatIDR(product.price)}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </section>
            `;
        }

        function renderCart(container) {
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-24 px-4">
                        <i class="fa-solid fa-bag-shopping text-6xl text-gray-200 mb-6"></i>
                        <h2 class="text-2xl font-bold mb-2">Keranjang Anda Kosong</h2>
                        <p class="text-gray-500 mb-8 text-center">Sepertinya Anda belum menambahkan produk apapun ke keranjang.</p>
                        <button onclick="showPage('home')" class="bg-black text-white px-8 py-3 rounded-full text-sm font-bold uppercase tracking-wider">Mulai Belanja</button>
                    </div>
                `;
                return;
            }

            const total = cart.reduce((acc, item) => acc + (item.price * item.quantity), 0);

            container.innerHTML = `
                <section class="max-w-4xl mx-auto px-4 py-12">
                    <h2 class="text-2xl font-bold mb-10">Keranjang Belanja</h2>
                    
                    <div class="space-y-8">
                        ${cart.map(item => `
                            <div class="flex items-center gap-6 border-b border-gray-100 pb-8">
                                <div class="w-24 h-32 bg-gray-100 flex-shrink-0">
                                    <img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover">
                                </div>
                                <div class="flex-grow">
                                    <div class="flex justify-between">
                                        <h3 class="font-medium">${item.name}</h3>
                                        <p class="font-semibold">${formatIDR(item.price * item.quantity)}</p>
                                    </div>
                                    <p class="text-sm text-gray-500 mb-4">${item.category}</p>
                                    <div class="flex items-center gap-4">
                                        <div class="flex border border-gray-200 rounded">
                                            <button onclick="changeQty(${item.id}, -1)" class="px-3 py-1 hover:bg-gray-50">-</button>
                                            <span class="px-3 py-1 border-x border-gray-200 text-sm">${item.quantity}</span>
                                            <button onclick="changeQty(${item.id}, 1)" class="px-3 py-1 hover:bg-gray-50">+</button>
                                        </div>
                                        <button onclick="removeItem(${item.id})" class="text-xs text-red-500 underline uppercase tracking-tighter">Hapus</button>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="mt-12 bg-gray-50 p-8 rounded-lg">
                        <div class="flex justify-between text-lg font-bold mb-6">
                            <span>Subtotal</span>
                            <span>${formatIDR(total)}</span>
                        </div>
                        <button onclick="showPage('checkout')" class="w-full bg-black text-white py-4 rounded-full font-bold uppercase tracking-widest hover:bg-gray-800 transition">
                            Lanjut ke Checkout
                        </button>
                        <button onclick="showPage('home')" class="w-full mt-4 text-sm font-medium text-gray-500 hover:text-black transition">
                            Lanjutkan Belanja
                        </button>
                    </div>
                </section>
            `;
        }

        function renderCheckout(container) {
            const total = cart.reduce((acc, item) => acc + (item.price * item.quantity), 0);
            
            container.innerHTML = `
                <section class="max-w-6xl mx-auto px-4 py-12">
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">
                        <!-- Left Side: Form -->
                        <div>
                            <h2 class="text-2xl font-bold mb-8">Detail Pengiriman</h2>
                            <form onsubmit="event.preventDefault(); showPage('success');" class="space-y-6">
                                <div class="grid grid-cols-2 gap-4">
                                    <div class="space-y-2">
                                        <label class="text-xs font-bold uppercase text-gray-500">Nama Depan</label>
                                        <input type="text" required class="w-full border border-gray-200 p-3 rounded focus:outline-none focus:border-black">
                                    </div>
                                    <div class="space-y-2">
                                        <label class="text-xs font-bold uppercase text-gray-500">Nama Belakang</label>
                                        <input type="text" required class="w-full border border-gray-200 p-3 rounded focus:outline-none focus:border-black">
                                    </div>
                                </div>
                                <div class="space-y-2">
                                    <label class="text-xs font-bold uppercase text-gray-500">Email</label>
                                    <input type="email" required class="w-full border border-gray-200 p-3 rounded focus:outline-none focus:border-black">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-xs font-bold uppercase text-gray-500">Alamat Lengkap</label>
                                    <textarea required rows="3" class="w-full border border-gray-200 p-3 rounded focus:outline-none focus:border-black"></textarea>
                                </div>
                                <div class="space-y-4 pt-4">
                                    <h3 class="font-bold">Metode Pembayaran</h3>
                                    <div class="space-y-3">
                                        <label class="flex items-center p-4 border border-gray-200 rounded cursor-pointer hover:bg-gray-50">
                                            <input type="radio" name="payment" checked class="accent-black">
                                            <span class="ml-3 font-medium">Bank Transfer (BCA/Mandiri)</span>
                                        </label>
                                        <label class="flex items-center p-4 border border-gray-200 rounded cursor-pointer hover:bg-gray-50">
                                            <input type="radio" name="payment" class="accent-black">
                                            <span class="ml-3 font-medium">Kartu Kredit / Debit</span>
                                        </label>
                                    </div>
                                </div>
                                <button type="submit" class="w-full bg-black text-white py-4 rounded-full font-bold uppercase tracking-widest mt-8">
                                    Bayar Sekarang
                                </button>
                            </form>
                        </div>

                        <!-- Right Side: Order Summary -->
                        <div class="bg-white border border-gray-100 p-8 h-fit sticky top-24">
                            <h3 class="text-lg font-bold mb-6">Ringkasan Pesanan</h3>
                            <div class="space-y-4 mb-8">
                                ${cart.map(item => `
                                    <div class="flex justify-between text-sm">
                                        <span>${item.name} (x${item.quantity})</span>
                                        <span>${formatIDR(item.price * item.quantity)}</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="border-t border-gray-100 pt-4 space-y-2">
                                <div class="flex justify-between text-sm text-gray-500">
                                    <span>Subtotal</span>
                                    <span>${formatIDR(total)}</span>
                                </div>
                                <div class="flex justify-between text-sm text-gray-500">
                                    <span>Pengiriman</span>
                                    <span>${formatIDR(25000)}</span>
                                </div>
                                <div class="flex justify-between text-lg font-bold pt-4 border-t border-gray-100">
                                    <span>Total</span>
                                    <span>${formatIDR(total + 25000)}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            `;
        }

        function renderSuccess(container) {
            cart = []; // Empty cart
            updateCartCount();
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center py-24 px-4 text-center">
                    <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-3xl mb-8">
                        <i class="fa-solid fa-check"></i>
                    </div>
                    <h2 class="text-3xl font-bold mb-4">Pesanan Berhasil!</h2>
                    <p class="text-gray-500 max-w-md mb-10">Terima kasih telah berbelanja di Alinea. Instruksi pembayaran telah dikirimkan ke email Anda.</p>
                    <button onclick="showPage('home')" class="bg-black text-white px-10 py-4 rounded-full font-bold uppercase tracking-widest">Kembali Berbelanja</button>
                </div>
            `;
        }

        // --- Event Handlers ---
        window.changeQty = (id, delta) => {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity += delta;
                if (item.quantity < 1) item.quantity = 1;
                renderCart(document.getElementById('app-content'));
                updateCartCount();
            }
        }

        window.removeItem = (id) => {
            cart = cart.filter(i => i.id !== id);
            renderCart(document.getElementById('app-content'));
            updateCartCount();
        }

        // --- Initialization ---
        window.onload = () => {
            showPage('home');
        };

    </script>
</body>
</html>
