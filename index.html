<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PandaPedia | Modern Digital Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
        .page { display: none; min-height: 100vh; }
        .page.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Card Styling inspired by ALINEA */
        .product-card { 
            background: white; 
            border-radius: 1.5rem; 
            border: 1px solid #f1f5f9; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            transition: transform 0.2s;
        }
        
        .product-card:active { transform: scale(0.97); }

        .image-wrapper {
            position: relative;
            height: 140px;
            background: linear-gradient(135deg, #0ea5e9 0%, #0c4a6e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .badge-icon {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 28px;
            height: 28px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
        }

        .badge-stock {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            padding: 2px 8px;
            border-radius: 6px;
            color: white;
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .hero-pattern { background-image: radial-gradient(#2563eb 0.5px, transparent 0.5px); background-size: 20px 20px; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .btn-buy {
            background: #0891b2;
            color: white;
            transition: all 0.2s;
        }
        .btn-buy:hover { background: #0e7490; }

        .notification-toast {
            position: fixed;
            bottom: 80px;
            left: 20px;
            right: 20px;
            background: white;
            border-radius: 1rem;
            padding: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
            border: 1px solid #f1f5f9;
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-lg border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="showPage('home-page')">
                <div class="w-8 h-8 bg-cyan-600 rounded-lg flex items-center justify-center text-white font-extrabold text-sm shadow-sm">P</div>
                <div class="flex flex-col leading-none">
                    <span class="font-black text-sm tracking-tight text-slate-900 uppercase">PandaPedia</span>
                    <span class="text-[9px] font-bold text-cyan-600 tracking-widest uppercase">Digital Store</span>
                </div>
            </div>
            <div class="flex space-x-2">
                <button class="w-9 h-9 bg-slate-100 rounded-full flex items-center justify-center text-slate-600">
                    <i class="fa-solid fa-bars-staggered text-xs"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Halaman Utama -->
    <div id="home-page" class="page active pt-14">
        
        <!-- Welcome Header -->
        <header class="px-4 py-6 bg-white">
            <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                <div class="w-10 h-10 bg-cyan-100 rounded-xl flex items-center justify-center text-cyan-600">
                    <i class="fa-solid fa-grid-2 text-sm"></i>
                </div>
                <div>
                    <h2 class="text-sm font-black uppercase text-slate-800 tracking-tight">Katalog Produk</h2>
                    <p class="text-[10px] text-slate-400 font-medium">Pilih produk premium yang anda inginkan</p>
                </div>
            </div>
        </header>

        <!-- Category Shortcuts -->
        <div class="px-4 mb-6 overflow-x-auto hide-scrollbar flex space-x-2">
            <button onclick="filterType('all')" class="cat-btn active whitespace-nowrap bg-cyan-600 text-white px-5 py-2.5 rounded-full text-[11px] font-bold shadow-sm transition-all">Semua</button>
            <button onclick="filterType('jasa')" class="cat-btn whitespace-nowrap bg-white border border-slate-200 text-slate-600 px-5 py-2.5 rounded-full text-[11px] font-bold shadow-sm transition-all">Layanan IT</button>
            <button onclick="filterType('premium')" class="cat-btn whitespace-nowrap bg-white border border-slate-200 text-slate-600 px-5 py-2.5 rounded-full text-[11px] font-bold shadow-sm transition-all">App Premium</button>
        </div>

        <!-- Katalog Content -->
        <div class="max-w-7xl mx-auto px-4 pb-24">
            <div class="grid grid-cols-2 gap-4" id="main-grid">
                <!-- Produk akan dimuat di sini oleh JS -->
            </div>
        </div>

        <!-- Floating Notification (Like the Canva order in screenshot) -->
        <div id="order-toast" class="notification-toast">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white">
                <i class="fa-solid fa-crown"></i>
            </div>
            <div class="flex-1">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-cyan-500 rounded-full"></span>
                    <span class="text-[9px] font-bold text-cyan-600 uppercase">Orderan Masuk</span>
                </div>
                <p class="text-xs font-black text-slate-800 leading-none mt-1">Netflix Premium</p>
                <p class="text-[10px] text-slate-400 mt-0.5">Ri*** • 2 menit yang lalu</p>
            </div>
            <button onclick="this.parentElement.remove()" class="text-slate-300"><i class="fa-solid fa-xmark text-sm"></i></button>
        </div>
    </div>

    <!-- Halaman Detail -->
    <div id="detail-page" class="page pt-4 pb-8 bg-white">
        <div class="px-4">
            <div class="flex items-center justify-between mb-6">
                <button onclick="showPage('home-page')" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-600"><i class="fa-solid fa-chevron-left"></i></button>
                <span class="font-black italic uppercase text-xs">Detail Produk</span>
                <div class="w-10"></div>
            </div>
            <div id="detail-content"></div>
        </div>
    </div>

    <!-- Halaman Pembayaran -->
    <div id="payment-page" class="page pt-4 pb-8 bg-white">
        <div class="px-4 max-w-md mx-auto text-center">
             <div class="flex items-center justify-between mb-6">
                <button onclick="showPage('detail-page')" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-600"><i class="fa-solid fa-chevron-left"></i></button>
                <span class="font-black italic uppercase text-xs">Konfirmasi</span>
                <div class="w-10"></div>
            </div>
            <div class="bg-slate-50 rounded-3xl p-6 border border-slate-100">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=PandaPediaPayment" class="w-48 mx-auto mb-4 border-4 border-white rounded-2xl shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-6">Scan QRIS All Payment</p>
                <div class="space-y-2 mb-8 text-left text-sm">
                    <div class="flex justify-between"><span>Produk</span><span id="pay-name" class="font-bold"></span></div>
                    <div class="flex justify-between"><span>Total</span><span id="pay-total" class="font-black text-cyan-600 text-lg"></span></div>
                </div>
                <button onclick="confirmToWA()" class="w-full py-4 bg-green-500 text-white rounded-2xl font-black text-sm flex items-center justify-center gap-2">
                    <i class="fa-brands fa-whatsapp"></i> KONFIRMASI PEMBAYARAN
                </button>
            </div>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "Netflix Premium", price: 35000, type: "premium", stock: 124, sold: "4.2k", rating: 5, icon: "fa-play" },
            { id: 2, name: "Youtube Premium", price: 12000, type: "premium", stock: 89, sold: "12k", rating: 5, icon: "fa-youtube" },
            { id: 3, name: "Canva Pro Masa Aktif", price: 15000, type: "premium", stock: 542, sold: "8.1k", rating: 4, icon: "fa-palette" },
            { id: 4, name: "ChatGPT Plus Pro", price: 185000, type: "premium", stock: 12, sold: "231", rating: 5, icon: "fa-robot" },
            { id: 5, name: "Jasa Website Pro", price: 750000, type: "jasa", stock: 5, sold: "42", rating: 5, icon: "fa-code" },
            { id: 6, name: "Tiktok 1k Follower", price: 45000, type: "jasa", stock: 999, sold: "1.5k", rating: 5, icon: "fa-bolt" },
            { id: 7, name: "Spotify Individual", price: 25000, type: "premium", stock: 67, sold: "3.4k", rating: 4, icon: "fa-music" },
            { id: 8, name: "Unlock IMEI iPhone", price: 450000, type: "jasa", stock: 10, sold: "156", rating: 5, icon: "fa-mobile-screen" }
        ];

        let currentFilter = 'all';
        let selectedProduct = null;

        function init() {
            renderGrid();
            
            // Auto hide notification after 5s
            setTimeout(() => {
                const toast = document.getElementById('order-toast');
                if(toast) toast.style.display = 'none';
            }, 6000);
        }

        function renderGrid() {
            const grid = document.getElementById('main-grid');
            const filtered = currentFilter === 'all' ? products : products.filter(p => p.type === currentFilter);
            
            grid.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <div class="image-wrapper">
                        <div class="badge-icon"><i class="fa-solid ${p.icon}"></i></div>
                        <div class="badge-stock"><i class="fa-solid fa-box text-[8px]"></i> ${p.stock}</div>
                        <h4 class="text-white font-black italic text-center px-4 uppercase text-xs leading-tight">${p.name}</h4>
                    </div>
                    <div class="p-3 flex flex-col flex-1">
                        <h3 class="text-[11px] font-bold text-slate-800 mb-1 leading-tight h-8 line-clamp-2">${p.name}</h3>
                        <div class="flex items-center gap-1 mb-2">
                            <div class="flex text-[8px] text-yellow-400">
                                ${Array(5).fill(0).map((_, i) => `<i class="fa-solid fa-star ${i >= p.rating ? 'text-slate-200' : ''}"></i>`).join('')}
                            </div>
                            <span class="text-[9px] text-slate-400 font-bold">| ${p.sold} Terjual</span>
                        </div>
                        <p class="text-sm font-black text-cyan-600 mb-3">Rp ${p.price.toLocaleString('id-ID')}</p>
                        
                        <div class="mt-auto space-y-2">
                            <button onclick="openDetail(${p.id})" class="w-full py-2 bg-cyan-600 text-white rounded-xl text-[10px] font-black uppercase flex items-center justify-center gap-2 active:scale-95 transition-all">
                                <i class="fa-solid fa-cart-shopping"></i> Beli Sekarang
                            </button>
                            <button onclick="openDetail(${p.id})" class="w-full py-2 border border-slate-100 text-slate-400 rounded-xl text-[10px] font-bold uppercase active:bg-slate-50 transition-all">
                                <i class="fa-solid fa-eye mr-1"></i> Detail
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterType(type) {
            currentFilter = type;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.remove('bg-cyan-600', 'text-white');
                btn.classList.add('bg-white', 'text-slate-600', 'border-slate-200');
            });
            event.target.classList.remove('bg-white', 'text-slate-600', 'border-slate-200');
            event.target.classList.add('bg-cyan-600', 'text-white');
            renderGrid();
        }

        function openDetail(id) {
            selectedProduct = products.find(p => p.id === id);
            const content = document.getElementById('detail-content');
            content.innerHTML = `
                <div class="bg-gradient-to-br from-cyan-500 to-blue-700 h-48 rounded-3xl flex items-center justify-center text-white mb-6">
                    <i class="fa-solid ${selectedProduct.icon} text-6xl opacity-30 absolute"></i>
                    <h2 class="text-2xl font-black uppercase italic text-center px-6 relative">${selectedProduct.name}</h2>
                </div>
                <div class="mb-6">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="bg-cyan-100 text-cyan-600 text-[9px] font-black px-2 py-1 rounded-md uppercase">${selectedProduct.type}</span>
                            <h2 class="text-xl font-black text-slate-800 mt-2">Rp ${selectedProduct.price.toLocaleString('id-ID')}</h2>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Stok Tersedia</p>
                            <p class="text-sm font-black text-slate-800">${selectedProduct.stock} Pcs</p>
                        </div>
                    </div>
                </div>
                <div class="bg-slate-50 p-5 rounded-3xl mb-8 border border-slate-100">
                    <h4 class="text-[10px] font-black uppercase mb-3 text-slate-400">Deskripsi Layanan</h4>
                    <ul class="space-y-2">
                        <li class="flex items-center gap-2 text-xs font-semibold text-slate-600"><i class="fa-solid fa-check text-green-500"></i> Proses Instan & Otomatis</li>
                        <li class="flex items-center gap-2 text-xs font-semibold text-slate-600"><i class="fa-solid fa-check text-green-500"></i> Full Garansi Sesuai Durasi</li>
                        <li class="flex items-center gap-2 text-xs font-semibold text-slate-600"><i class="fa-solid fa-check text-green-500"></i> Support Admin 24/7</li>
                    </ul>
                </div>
                <button onclick="proceedToPayment()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-sm uppercase shadow-lg active:scale-95 transition-all">LANJUTKAN PESANAN</button>
            `;
            showPage('detail-page');
        }

        function proceedToPayment() {
            document.getElementById('pay-name').innerText = selectedProduct.name;
            document.getElementById('pay-total').innerText = `Rp ${selectedProduct.price.toLocaleString('id-ID')}`;
            showPage('payment-page');
        }

        function confirmToWA() {
            const msg = `Halo Admin PandaPedia, saya ingin order:\n\nProduk: ${selectedProduct.name}\nTotal: Rp ${selectedProduct.price.toLocaleString('id-ID')}\nMetode: QRIS`;
            window.open(`https://wa.me/628976071999?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0, 0);
        }

        window.onload = init;
    </script>
</body>
</html>
